<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galería - HR Social Consulting</title>
    <link rel="stylesheet" href="assets/css/style.css" />
  </head>
  <body>
    <div
      id="site-header-container"
      data-header-path="partials/header.html"
      data-active-href="#galeria"
    ></div>

    <main>
      <!-- HERO BANNER (Galería) -->
      <section class="hero-slider hero-slider--compact hero-slider--galeria" id="inicio">
        <div class="hero-slider__track">
          <div
            class="hero-slide hero-slide--active hero-slide--centered"
            data-slide="0"
            style="background-image: url('assets/img/galeria/banner.png');"
          >
            <div class="hero-slide__overlay hero-slide__overlay--galeria"></div>
            <div class="container hero-slide__content hero-slide__content--centered">
              <h1 class="hero-slide__title hero-slide__title--page">Galería de fotos</h1>
              <p class="hero-slide__subtitle hero-slide__subtitle--pill">
                Contamos con servicios a <strong> nivel nacional</strong>
              </p>
            </div>
          </div>
        </div>
      </section>

      <!-- GALERÍA DE FOTOS -->
      <section class="section-galeria section-galeria--page" id="galeria">
        <div class="container">
          <div class="galeria-fotos galeria-fotos--page">
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/vilca.png" alt="Vilca - RPNYC" />
              <figcaption class="galeria-fotos__caption">Vilca - RPNYC</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/junin.png" alt="Junín" />
              <figcaption class="galeria-fotos__caption">Junín</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/arequipa.png" alt="Arequipa" />
              <figcaption class="galeria-fotos__caption">Arequipa</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/Huancavelica.png" alt="Huancavelica" />
              <figcaption class="galeria-fotos__caption">Huancavelica</figcaption>
            </figure>

            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/Loreto.png" alt="Loreto" />
              <figcaption class="galeria-fotos__caption">Loreto</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/san_martin_1.png" alt="San Martín" />
              <figcaption class="galeria-fotos__caption">San Martín</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/san_martin_2.png" alt="San Martín" />
              <figcaption class="galeria-fotos__caption">San Martín</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/pasco.png" alt="Pasco" />
              <figcaption class="galeria-fotos__caption">Pasco</figcaption>
            </figure>

            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/puno1.png" alt="Puno" />
              <figcaption class="galeria-fotos__caption">Puno</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/puno2.png" alt="Puno" />
              <figcaption class="galeria-fotos__caption">Puno</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/ancash.png" alt="Ancash" />
              <figcaption class="galeria-fotos__caption">Ancash</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/lima.png" alt="Lima" />
              <figcaption class="galeria-fotos__caption">Lima</figcaption>
            </figure>

            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/cuzco.png" alt="Cusco" />
              <figcaption class="galeria-fotos__caption">Cusco</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/amazonas.png" alt="Amazonas" />
              <figcaption class="galeria-fotos__caption">Amazonas</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/lambayeque.png" alt="Lambayeque" />
              <figcaption class="galeria-fotos__caption">Lambayeque</figcaption>
            </figure>
            <figure class="galeria-fotos__item">
              <img src="assets/img/galeria/amazonas2.png" alt="Amazonas" />
              <figcaption class="galeria-fotos__caption">Amazonas</figcaption>
            </figure>
          </div>
        </div>
      </section>
    </main>

    <div id="site-footer-container" data-footer-path="partials/footer.html"></div>

    <script src="assets/js/main.js"></script>
    <script src="assets/js/include-header.js"></script>
    <script src="assets/js/include-footer.js"></script>
  </body>
</html>
