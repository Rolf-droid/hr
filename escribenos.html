<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Escríbenos - HR Social Consulting</title>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
      .escribenos-banner {
        position: relative;
        width: 100%;
        text-align: center;
      }

      .escribenos-banner__image {
        width: 100%;
        height: auto;
        display: block;
      }

      .escribenos-banner__overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.35);
      }

      .escribenos-banner__content {
        position: absolute;
        inset: 0;
        z-index: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 1rem;
      }

      .escribenos-banner__title {
        margin: 0;
        color: #fff;
        font-family: var(--font-sans);
        font-size: clamp(1.75rem, 4vw, 3.75rem);
        font-weight: 700;
      }

      .escribenos-form-section {
        background: #f2f2f2;
        padding: 2.8rem 0 3.2rem;
      }

      .escribenos-form {
        max-width: 760px;
        margin: 0 auto;
      }

      .escribenos-form__group {
        margin-bottom: 1rem;
      }

      .escribenos-form__label {
        display: block;
        margin-bottom: 0.38rem;
        color: #666;
        font-size: 1.05rem;
        font-weight: 500;
      }

      .escribenos-form__input,
      .escribenos-form__textarea {
        width: 100%;
        border: 1px solid #dbdbdb;
        border-radius: 8px;
        background: #f7f7f7;
        color: #333;
        font: inherit;
        padding: 0.72rem 0.9rem;
        outline: none;
      }

      .escribenos-form__textarea {
        min-height: 120px;
        resize: vertical;
      }

      .escribenos-form__input:focus,
      .escribenos-form__textarea:focus {
        border-color: #c9c9c9;
      }

      .escribenos-form__actions {
        margin-top: 1.5rem;
        display: flex;
        justify-content: center;
      }

      .escribenos-form__submit {
        border: 0;
        border-radius: 4px;
        background: #23a638;
        color: #fff;
        font-size: 0.95rem;
        font-weight: 700;
        padding: 0.62rem 2.2rem;
        cursor: pointer;
        transition: opacity 0.2s ease;
      }

      .escribenos-form__submit:hover {
        opacity: 0.92;
      }

      .escribenos-form__submit:disabled {
        opacity: 0.65;
        cursor: not-allowed;
      }

      .escribenos-form__status {
        margin-top: 1rem;
        padding: 0.75rem 1rem;
        border-radius: 8px;
        font-size: 0.95rem;
        text-align: center;
      }

      .escribenos-form__status--success {
        background: #e8f6eb;
        color: #1b5e20;
        border: 1px solid #a5d6a7;
      }

      .escribenos-form__status--error {
        background: #ffebee;
        color: #b71c1c;
        border: 1px solid #ef9a9a;
      }

      @media (max-width: 768px) {
        .escribenos-form-section {
          padding: 2.2rem 0 2.4rem;
        }

        .escribenos-form {
          max-width: 100%;
        }
      }

      @media (max-width: 480px) {
        .escribenos-banner__content {
          padding: 0 0.75rem;
        }

        .escribenos-banner__title {
          font-size: clamp(1.35rem, 7vw, 2.25rem);
        }

        .escribenos-form-section {
          padding: 1.8rem 0 2rem;
        }

        .escribenos-form__label {
          font-size: 0.95rem;
        }

        .escribenos-form__input,
        .escribenos-form__textarea {
          padding: 0.62rem 0.8rem;
          border-radius: 6px;
        }

        .escribenos-form__textarea {
          min-height: 110px;
        }

        .escribenos-form__submit {
          width: 100%;
          max-width: 260px;
          padding: 0.65rem 1rem;
        }
      }
    </style>
  </head>
  <body>
    <div
      id="site-header-container"
      data-header-path="partials/header.html"
      data-active-href="#escribenos"
    ></div>

    <main>
      <section class="escribenos-banner" id="escribenos">
        <img
          class="escribenos-banner__image"
          src="assets/img/escribenos/baner.jpg"
          alt="Banner de Escríbenos"
        />
        <div class="escribenos-banner__overlay"></div>
        <div class="escribenos-banner__content">
          <h1 class="escribenos-banner__title">Escríbenos</h1>
        </div>
      </section>

      <section class="escribenos-form-section" id="contacto-formulario">
        <div class="container">
          <form class="escribenos-form" id="escribenos-form" action="#" method="post" novalidate>
            <div class="escribenos-form__group">
              <label class="escribenos-form__label" for="nombre">Nombre Completo</label>
              <input
                class="escribenos-form__input"
                type="text"
                id="nombre"
                name="nombre"
                required
                maxlength="200"
                autocomplete="name"
              />
            </div>

            <div class="escribenos-form__group">
              <label class="escribenos-form__label" for="email">Email</label>
              <input
                class="escribenos-form__input"
                type="email"
                id="email"
                name="email"
                required
                maxlength="320"
                autocomplete="email"
              />
            </div>

            <div class="escribenos-form__group">
              <label class="escribenos-form__label" for="tema">Tema</label>
              <input
                class="escribenos-form__input"
                type="text"
                id="tema"
                name="tema"
                required
                maxlength="300"
              />
            </div>

            <div class="escribenos-form__group">
              <label class="escribenos-form__label" for="mensaje">Mensaje</label>
              <textarea
                class="escribenos-form__textarea"
                id="mensaje"
                name="mensaje"
                required
                maxlength="8000"
              ></textarea>
            </div>

            <div class="escribenos-form__actions">
              <button class="escribenos-form__submit" type="submit">Enviar</button>
            </div>
            <p
              id="escribenos-form-status"
              class="escribenos-form__status"
              role="status"
              aria-live="polite"
              hidden
            ></p>
          </form>
        </div>
      </section>
    </main>

    <div id="site-footer-container" data-footer-path="partials/footer.html"></div>

    <!-- Web3Forms → consultinghrsocial@gmail.com -->
    <script>
      window.HR_WEB3FORMS_ACCESS_KEY = "1da5091d-61de-4252-951b-ae77c2017355";
    </script>
    <script src="assets/js/main.js"></script>
    <script src="assets/js/include-header.js"></script>
    <script src="assets/js/include-footer.js"></script>
    <script src="assets/js/escribenos-form.js"></script>
  </body>
</html>
